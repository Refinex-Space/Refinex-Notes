<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow-c1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.1" />
    </filter>
    <linearGradient id="paper-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8f9fa"/>
    </linearGradient>
  </defs>
  <!-- 背景纸张 -->
  <rect x="20" y="30" width="200" height="200" rx="45" fill="#e9ecef" transform="rotate(-6 128 128)"/>
  <rect x="20" y="30" width="200" height="200" rx="45" fill="#f8f9fa" transform="rotate(-3 128 128)"/>
  <!-- 主纸张 -->
  <rect x="28" y="28" width="200" height="200" rx="45" fill="url(#paper-grad)" filter="url(#shadow-c1)"/>
  <!-- 文本骨架线 -->
  <g fill="#f1f3f5">
    <rect x="60" y="70" width="136" height="12" rx="6" />
    <rect x="60" y="100" width="136" height="12" rx="6" />
    <rect x="60" y="130" width="136" height="12" rx="6" />
    <rect x="60" y="160" width="136" height="12" rx="6" />
    <rect x="60" y="190" width="136" height="12" rx="6" />
  </g>
  <!-- 主字母 R -->
  <text x="128" y="180" font-family="'Didot', 'Bodoni MT', 'Times New Roman', serif" font-size="140" font-weight="bold" text-anchor="middle" fill="#212529">R</text>
</svg>